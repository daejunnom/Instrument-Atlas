name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Check JSON normalization
        run: npm run check:json

      - name: Check pack links
        run: npm run check:packs

      - name: Validate catalog
        run: npm run validate

      - name: Build runtime catalog
        run: npm run build

      - name: Create release package
        run: npm run package

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/*.zip --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" release/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes "Automated release for $TAG_NAME."
          fi