name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-build-package:
    name: Validate, build, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Check JSON normalization
        run: npm run check:json

      - name: Check pack links
        run: npm run check:packs

      - name: Validate catalog
        run: npm run validate

      - name: Build runtime catalog
        run: npm run build

      - name: Create release package
        run: npm run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: instrument-atlas-package
          path: release/*.zip
          if-no-files-found: error